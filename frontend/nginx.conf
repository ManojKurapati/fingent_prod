# Serves the built React app and reverse-proxies the platform API to the
# backend container. The API path list mirrors frontend/vite.config.ts.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Backend service name on the compose/internal network.
    set $api http://backend:8000;

    # SSE progress stream — disable buffering so events flush immediately.
    location ~ ^/jobs/.*/events$ {
        proxy_pass $api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /health     { proxy_pass $api; }
    location /approvals  { proxy_pass $api; }
    location /jobs       { proxy_pass $api; }
    location /agents     { proxy_pass $api; }

    # SPA fallback for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
