# Pre-commit hooks for the AI-native finance platform.
# Install:  pip install pre-commit && pre-commit install
# Run all:  pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  # Backend: ruff (lint + format) and mypy, run from backend/ via uv.
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (backend)
        entry: bash -c 'cd backend && uv run ruff check app tests'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
      - id: ruff-format
        name: ruff format --check (backend)
        entry: bash -c 'cd backend && uv run ruff format --check app tests'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
      - id: mypy
        name: mypy (backend)
        entry: bash -c 'cd backend && uv run mypy'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false

      # Frontend: eslint + tsc, run from frontend/.
      - id: eslint
        name: eslint (frontend)
        entry: bash -c 'cd frontend && npm run lint'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
      - id: tsc
        name: tsc --noEmit (frontend)
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false
